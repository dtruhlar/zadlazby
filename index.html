<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulačka zádlažby - Kompaktní</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #059669; /* Sytě zelená */
      --blue: #2563eb;   /* Sytě modrá */
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* Zamezení scrollu na desktopu */
    }

    .container {
      width: 95%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
    }
    h1 span { color: var(--accent); }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .section-title {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 15px;
      display: block;
    }

    /* Toggles */
    .toggle-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tog {
      padding: 10px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: #fff;
      cursor: pointer;
      text-align: left;
      transition: 0.2s;
    }
    .tog.active {
      border-color: var(--accent);
      background: #ecfdf5;
    }
    .tog strong { display: block; font-size: 14px; }
    .tog span { font-size: 11px; color: var(--muted); font-family: 'DM Mono'; }

    /* Inputs */
    .field { margin-bottom: 12px; }
    .field label {
      display: flex; 
      justify-content: space-between; 
      font-size: 12px; 
      margin-bottom: 4px;
      font-weight: 600;
    }
    .input-wrap {
      display: flex;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      focus-within { border-color: var(--text); }
    }
    .input-wrap input {
      flex: 1; border: none; padding: 8px 12px; font-size: 16px; font-weight: 600; outline: none;
    }
    .input-wrap .unit {
      background: var(--bg); padding: 8px; border-left: 1px solid var(--border); font-size: 12px; font-weight: 600;
    }

    /* Results */
    .results-stack { display: flex; flex-direction: column; gap: 12px; }
    .res-item {
      padding: 15px;
      border-radius: var(--radius);
      background: var(--bg);
      border-left: 5px solid var(--border);
    }
    .res-item.blue { border-left-color: var(--blue); }
    .res-item.green { border-left-color: var(--accent); }
    
    .res-val { font-size: 24px; font-weight: 800; font-family: 'Syne'; }
    .res-label { font-size: 11px; font-family: 'DM Mono'; color: var(--muted); text-transform: uppercase; }

    .total-box {
      margin-top: auto;
      background: var(--text);
      color: white;
      padding: 20px;
      border-radius: var(--radius);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-box .tv { font-size: 32px; font-weight: 800; color: var(--accent); }

    .formula {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: #f1f5f9;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      color: #475569;
    }

    .hidden { display: none; }

    @media (max-width: 768px) {
      body { overflow: auto; height: auto; padding: 20px 0; }
      .main-grid { grid-template-columns: 1fr; }
      .container { width: 90%; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Kalkulačka <span>zádlažby</span></h1>
    <div style="font-family:'DM Mono'; font-size:12px; color:var(--muted)">v1.1 | High-Contrast</div>
  </header>

  <div class="main-grid">
    <div class="card">
      <span class="section-title">1. Typ prostředí</span>
      <div class="toggle-wrap">
        <button class="tog active" id="btn-ostatni" onclick="setTyp('ostatni')">
          <strong>Ostatní</strong>
          <span>+ 0,5 m</span>
        </button>
        <button class="tog" id="btn-zelen" onclick="setTyp('zelen')">
          <strong>V zeleni</strong>
          <span>D × (Š+H+0,6)</span>
        </button>
      </div>

      <span class="section-title">2. Rozměry výkopu</span>
      <div class="field">
        <label>Délka <span>[m]</span></label>
        <div class="input-wrap">
          <input type="number" id="inp-delka" step="0.1" value="10" oninput="calc()">
          <span class="unit">m</span>
        </div>
      </div>

      <div class="field">
        <label>Šířka <span>[m]</span></label>
        <div class="input-wrap">
          <input type="number" id="inp-sirka" step="0.01" value="0.65" oninput="calc()">
          <span class="unit">m</span>
        </div>
      </div>

      <div class="field" id="field-hloubka" style="display:none;">
        <label>Hloubka <span>[m]</span></label>
        <div class="input-wrap">
          <input type="number" id="inp-hloubka" step="0.01" value="0.80" oninput="calc()">
          <span class="unit">m</span>
        </div>
      </div>

      <div class="formula" id="formula-box"></div>
    </div>

    <div class="card" style="display: flex; flex-direction: column;">
      <span class="section-title">3. Výpočet plochy</span>
      
      <div class="results-stack">
        <div class="res-item blue">
          <div class="res-label">Nad výkopem</div>
          <div class="res-val" id="res-nad">6,50 m²</div>
          <div style="font-size:11px; color:var(--muted)" id="sub-nad">10 × 0,65</div>
        </div>

        <div class="res-item green">
          <div class="res-label">Mimo výkop (přídavná plocha)</div>
          <div class="res-val" id="res-mimo">5,00 m²</div>
          <div style="font-size:11px; color:var(--muted)" id="sub-mimo">10 × 0,5</div>
        </div>
      </div>

      <div class="total-box">
        <div>
          <div style="font-size: 11px; font-family: 'DM Mono'; opacity: 0.8;">CELKOVÁ PLOCHA</div>
          <div style="font-size: 12px;">zádlažba dohromady</div>
        </div>
        <div class="tv" id="res-total">11,50 m²</div>
      </div>
    </div>
  </div>
</div>

<script>
  let typ = 'ostatni';

  function setTyp(t) {
    typ = t;
    document.getElementById('btn-ostatni').classList.toggle('active', t === 'ostatni');
    document.getElementById('btn-zelen').classList.toggle('active', t === 'zelen');
    document.getElementById('field-hloubka').style.display = (t === 'zelen' ? 'block' : 'none');
    calc();
  }

  function calc() {
    const d = parseFloat(document.getElementById('inp-delka').value) || 0;
    const s = parseFloat(document.getElementById('inp-sirka').value) || 0;
    const h = parseFloat(document.getElementById('inp-hloubka').value) || 0;

    let nad = d * s;
    let mimo, formula, subMimo;

    if (typ === 'ostatni') {
      mimo = d * 0.5;
      subMimo = `${d.toFixed(2)} × 0,50`;
      formula = `Vzorec: (D × Š) + (D × 0,5)`;
    } else {
      const koef = (s + h + 0.6);
      mimo = d * koef;
      subMimo = `${d.toFixed(2)} × (${s.toFixed(2)} + ${h.toFixed(2)} + 0,6)`;
      formula = `Vzorec: (D × Š) + (D × (Š + H + 0,6))`;
    }

    document.getElementById('res-nad').textContent = nad.toFixed(2).replace('.', ',') + ' m²';
    document.getElementById('sub-nad').textContent = `${d.toFixed(2)} × ${s.toFixed(2)}`;
    
    document.getElementById('res-mimo').textContent = mimo.toFixed(2).replace('.', ',') + ' m²';
    document.getElementById('sub-mimo').textContent = subMimo.replace(/\./g, ',');
    
    document.getElementById('res-total').textContent = (nad + mimo).toFixed(2).replace('.', ',') + ' m²';
    document.getElementById('formula-box').textContent = formula;
  }

  calc();
</script>

</body>
</html>
