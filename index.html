<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulačka zádlažby | SUAS GRID</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* SUAS GRID PALETTE */
      --suas-blue: #00335F;
      --suas-light-blue: #0076C0;
      --suas-green: #37B34A;
      --suas-yellow: #C5D91B;
      --suas-teal: #00A99D;
      
      /* LIGHT MODE */
      --bg: #f8fafc;
      --card: #ffffff;
      --text: var(--suas-blue);
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: var(--suas-green);
    }

    body.dark-mode {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #4ade80;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* Fixace na jednu stránku */
      transition: background 0.3s;
    }

    .app-container {
      width: 95%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--border);
    }

    .logo-area { display: flex; align-items: center; gap: 15px; }
    .suas-logo { height: 45px; width: auto; }

    /* Přepínač Dark Mode */
    .theme-switch {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .switch-bg {
      width: 40px;
      height: 20px;
      background: var(--border);
      border-radius: 20px;
      position: relative;
    }
    .switch-dot {
      width: 16px;
      height: 16px;
      background: var(--suas-light-blue);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: 0.3s;
    }
    body.dark-mode .switch-dot { transform: translateX(20px); background: var(--suas-yellow); }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }

    .section-title {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: block;
    }

    /* Toggles */
    .toggle-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
    .tog-btn {
      padding: 15px;
      border: 2px solid var(--border);
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: 0.2s;
      color: var(--text);
    }
    .tog-btn.active { border-color: var(--suas-green); background: rgba(55, 179, 74, 0.1); }
    .tog-btn strong { display: block; font-size: 15px; margin-bottom: 4px; }
    .tog-btn span { font-size: 11px; font-family: 'DM Mono'; opacity: 0.8; }

    /* Inputs */
    .input-field { margin-bottom: 15px; }
    .input-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .input-control {
      display: flex;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .input-control input {
      flex: 1; border: none; background: transparent; padding: 12px; font-size: 18px; font-weight: 700; color: var(--text); outline: none;
    }
    .unit-tag { background: var(--border); padding: 12px; font-size: 12px; font-weight: 800; color: var(--muted); }

    /* Results */
    .res-box {
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      background: var(--bg);
      border-left: 6px solid var(--suas-light-blue);
    }
    .res-box.green { border-left-color: var(--suas-green); }
    .res-label { font-family: 'DM Mono'; font-size: 11px; text-transform: uppercase; color: var(--muted); }
    .res-value { font-family: 'Syne'; font-size: 28px; font-weight: 800; margin: 4px 0; }

    .total-highlight {
      margin-top: auto;
      background: linear-gradient(135deg, var(--suas-blue) 0%, var(--suas-light-blue) 100%);
      color: white;
      padding: 25px;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-val { font-family: 'Syne'; font-size: 36px; font-weight: 800; color: var(--suas-yellow); }

    .formula-info {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      margin-top: 15px;
      color: var(--muted);
      padding: 10px;
      background: rgba(0,0,0,0.03);
      border-radius: 8px;
    }

    @media (max-width: 850px) {
      body { overflow: auto; height: auto; padding: 20px; }
      .main-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="logo-area">
      <svg class="suas-logo" viewBox="0 0 351 166" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M68 0C55 0 41 6 31 16C12 35 0 61 0 88L34 54C40 48 52 43 68 43L68 0Z" fill="#C5D91B"/>
        <path d="M68 129C84 129 96 124 102 118L136 84C136 111 124 137 105 156C95 166 81 172 68 172L68 129Z" fill="#37B34A"/>
        <path d="M0 88C0 115 12 141 31 160L136 55C136 28 124 2 105 -17L0 88Z" fill="#00A99D"/>
        <path d="M136 82L31 166H68C81 166 95 160 105 150C124 131 136 105 136 78L136 82Z" fill="#0076C0"/>
      </svg>
      <h1 style="font-family:'Syne'; font-weight:800; font-size:20px; text-transform:uppercase;">Kalkulačka <span style="color:var(--suas-green)">zádlažby</span></h1>
    </div>
    
    <div class="theme-switch" onclick="toggleTheme()">
      <span>DARK MODE</span>
      <div class="switch-bg"><div class="switch-dot"></div></div>
    </div>
  </header>

  <div class="main-grid">
    <div class="card">
      <span class="section-title">Nastavení parametrů</span>
      
      <div class="toggle-group">
        <button class="tog-btn active" id="btn-ostatni" onclick="setTyp('ostatni')">
          <strong>🏗️ Ostatní</strong>
          <span>Přesah + 0,5 m</span>
        </button>
        <button class="tog-btn" id="btn-zelen" onclick="setTyp('zelen')">
          <strong>🌿 V zeleni</strong>
          <span>D × (Š+H+0,6)</span>
        </button>
      </div>

      <div class="input-field">
        <div class="input-label">Délka výkopu</div>
        <div class="input-control">
          <input type="number" id="inp-delka" value="10" step="0.5" oninput="calc()">
          <span class="unit-tag">M</span>
        </div>
      </div>

      <div class="input-field">
        <div class="input-label">Šířka výkopu</div>
        <div class="input-control">
          <input type="number" id="inp-sirka" value="0.65" step="0.01" oninput="calc()">
          <span class="unit-tag">M</span>
        </div>
      </div>

      <div class="input-field" id="h-wrap" style="display:none">
        <div class="input-label">Hloubka výkopu</div>
        <div class="input-control">
          <input type="number" id="inp-hloubka" value="0.80" step="0.01" oninput="calc()">
          <span class="unit-tag">M</span>
        </div>
      </div>

      <div class="formula-info" id="txt-formula">Vzorec: (D × Š) + (D × 0,5)</div>
    </div>

    <div class="card" style="display:flex; flex-direction:column;">
      <span class="section-title">Detailní výpočet</span>
      
      <div class="res-box">
        <div class="res-label">Plocha nad výkopem</div>
        <div class="res-value" id="res-nad">6,50 m²</div>
        <div style="font-size:11px; color:var(--muted)" id="sub-nad">10 × 0,65</div>
      </div>

      <div class="res-box green">
        <div class="res-label">Přídavná plocha (mimo výkop)</div>
        <div class="res-value" id="res-mimo">5,00 m²</div>
        <div style="font-size:11px; color:var(--muted)" id="sub-mimo">10 × 0,5</div>
      </div>

      <div class="total-highlight">
        <div>
          <div style="font-family:'DM Mono'; font-size:12px; opacity:0.8">CELKOVÁ ZÁDLAŽBA</div>
          <div style="font-size:14px; font-weight:600">Suma ploch</div>
        </div>
        <div class="total-val" id="res-total">11,50 m²</div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentTyp = 'ostatni';

  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
  }

  function setTyp(t) {
    currentTyp = t;
    document.getElementById('btn-ostatni').classList.toggle('active', t === 'ostatni');
    document.getElementById('btn-zelen').classList.toggle('active', t === 'zelen');
    document.getElementById('h-wrap').style.display = (t === 'zelen' ? 'block' : 'none');
    calc();
  }

  function calc() {
    const d = parseFloat(document.getElementById('inp-delka').value) || 0;
    const s = parseFloat(document.getElementById('inp-sirka').value) || 0;
    const h = parseFloat(document.getElementById('inp-hloubka').value) || 0;

    const nad = d * s;
    let mimo, formula, subMimo;

    if (currentTyp === 'ostatni') {
      mimo = d * 0.5;
      subMimo = `${d.toFixed(2)} × 0,50`;
      formula = `Vzorec: (D × Š) + (D × 0,5)`;
    } else {
      const koef = (s + h + 0.6);
      mimo = d * koef;
      subMimo = `${d.toFixed(2)} × (${s.toFixed(2)} + ${h.toFixed(2)} + 0,6)`;
      formula = `Vzorec: (D × Š) + (D × (Š + H + 0,6))`;
    }

    document.getElementById('res-nad').textContent = nad.toFixed(2).replace('.', ',') + ' m²';
    document.getElementById('sub-nad').textContent = `${d.toFixed(2)} × ${s.toFixed(2)}`.replace(/\./g, ',');
    
    document.getElementById('res-mimo').textContent = mimo.toFixed(2).replace('.', ',') + ' m²';
    document.getElementById('sub-mimo').textContent = subMimo.replace(/\./g, ',');
    
    document.getElementById('res-total').textContent = (nad + mimo).toFixed(2).replace('.', ',') + ' m²';
    document.getElementById('txt-formula').textContent = formula;
  }
</script>

</body>
</html>
