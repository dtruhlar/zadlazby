<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulačka zádlažby | SUAS GRID</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* SUAS GRID PALETTE */
      --suas-blue: #00335F;
      --suas-light-blue: #0076C0;
      --suas-green: #37B34A;
      --suas-yellow: #C5D91B;
      
      /* LIGHT MODE */
      --bg: #f8fafc;
      --card: #ffffff;
      --text: var(--suas-blue);
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: var(--suas-green);
      --input-bg: #f1f5f9;
    }

    body.dark-mode {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #4ade80;
      --input-bg: #0f172a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }

    /* STYL PRO NAČTENÉ SVG */
    .logo-link {
      height: 75px;
      display: flex;
      align-items: center;
    }

    .logo-img {
      height: 100%;
      width: auto;
      display: block;
      transition: filter 0.3s ease;
    }

    /* V Dark Mode invertujeme tmavé části SVG na světlé */
    body.dark-mode .logo-img {
      filter: brightness(0) invert(1);
    }

    .header-right {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .theme-switch {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 800;
      font-family: 'DM Mono', monospace;
    }
    .switch-bg {
      width: 36px;
      height: 18px;
      background: var(--border);
      border-radius: 20px;
      position: relative;
    }
    .switch-dot {
      width: 14px;
      height: 14px;
      background: var(--suas-light-blue);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.dark-mode .switch-dot { transform: translateX(18px); background: var(--suas-yellow); }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }

    .section-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    .toggle-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
    .tog-btn {
      padding: 15px;
      border: 2px solid var(--border);
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: 0.2s;
      color: var(--text);
    }
    .tog-btn.active { border-color: var(--suas-green); background: rgba(55, 179, 74, 0.1); }
    .tog-btn strong { display: block; font-size: 15px; margin-bottom: 4px; font-family: 'Syne'; }
    .tog-btn span { font-size: 11px; font-family: 'DM Mono'; opacity: 0.7; }

    .input-field { margin-bottom: 15px; }
    .input-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .input-control {
      display: flex;
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .input-control input {
      flex: 1; border: none; background: transparent; padding: 14px; font-size: 20px; font-weight: 800; color: var(--text); outline: none; font-family: 'Inter';
    }
    .unit-tag { background: var(--border); padding: 14px; font-size: 12px; font-weight: 800; color: var(--muted); display: flex; align-items: center; }

    .res-box {
      padding: 22px;
      border-radius: 14px;
      margin-bottom: 15px;
      background: rgba(0,0,0,0.02);
      border-left: 6px solid var(--suas-light-blue);
    }
    .res-box.green { border-left-color: var(--suas-green); }
    .res-label { font-family: 'DM Mono'; font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .res-value { font-family: 'Syne'; font-size: 32px; font-weight: 800; }

    .total-highlight {
      margin-top: auto;
      background: linear-gradient(135deg, var(--suas-blue) 0%, var(--suas-light-blue) 100%);
      color: white;
      padding: 30px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-val { font-family: 'Syne'; font-size: 42px; font-weight: 800; color: var(--suas-yellow); }

    .formula-info {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      margin-top: 15px;
      color: var(--muted);
      padding: 12px;
      background: rgba(0,0,0,0.03);
      border-radius: 10px;
    }

    @media (max-width: 850px) {
      header { flex-direction: column; gap: 20px; align-items: flex-start; }
      .logo-link { height: 60px; }
      .header-right { align-items: flex-start; text-align: left; }
      .main-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="logo-link">
      <img src="SUAS GRID LOGO.svg" alt="SUAS GRID" class="logo-img">
    </div>
    
    <div class="header-right">
      <h1 style="font-family:'Syne'; font-weight:800; font-size:22px; text-transform:uppercase;">Kalkulačka <span style="color:var(--suas-green)">zádlažby</span></h1>
      <div class="theme-switch" onclick="toggleTheme()">
        <span>DARK MODE</span>
        <div class="switch-bg"><div class="switch-dot"></div></div>
      </div>
    </div>
  </header>

  <div class="main-grid">
    <div class="card">
      <span class="section-title">Parametry výkopu</span>
      
      <div class="toggle-group">
        <button class="tog-btn active" id="btn-ostatni" onclick="setTyp('ostatni')">
          <strong>🏗️ Ostatní</strong>
          <span>Přesah + 0,5 m</span>
        </button>
        <button class="tog-btn" id="btn-zelen" onclick="setTyp('zelen')">
          <strong>🌿 V zeleni</strong>
          <span>D × (Š+H+0,6)</span>
        </button>
      </div>

      <div class="input-field">
        <div class="input-label">Délka (D)</div>
        <div class="input-control">
          <input type="number" id="inp-delka" value="10" step="0.5" oninput="calc()">
          <span class="unit-tag">M</span>
        </div>
      </div>

      <div class="input-field">
        <div class="input-label">Šířka (Š)</div>
        <div class="input-control">
          <input type="number" id="inp-sirka" value="0.65" step="0.01" oninput="calc()">
          <span class="unit-tag">M</span>
        </div>
      </div>

      <div class="input-field" id="h-wrap" style="display:none">
        <div class="input-label">Hloubka (H)</div>
        <div class="input-control">
          <input type="number" id="inp-hloubka" value="0.80" step="0.01" oninput="calc()">
          <span class="unit-tag">M</span>
        </div>
      </div>

      <div class="formula-info" id="txt-formula">Vzorec: (D × Š) + (D × 0,5)</div>
    </div>

    <div class="card">
      <span class="section-title">Výpočet ploch</span>
      
      <div class="res-box">
        <div class="res-label">Nad výkopem</div>
        <div class="res-value" id="res-nad">6,50 m²</div>
        <div style="font-size:11px; font-family:'DM Mono'; color:var(--muted);" id="sub-nad">10,00 × 0,65</div>
      </div>

      <div class="res-box green">
        <div class="res-label">Přídavná plocha</div>
        <div class="res-value" id="res-mimo">5,00 m²</div>
        <div style="font-size:11px; font-family:'DM Mono'; color:var(--muted);" id="sub-mimo">10,00 × 0,50</div>
      </div>

      <div class="total-highlight">
        <div>
          <div style="font-family:'DM Mono'; font-size:12px; font-weight:800; opacity:0.8;">CELKEM</div>
        </div>
        <div class="total-val" id="res-total">11,50 m²</div>
      </div>
    </div>
  </div>
  <footer>
    © 2026 SUAS Grid s.r.o. - Ing. David Truhlář &nbsp; | &nbsp; verze 1.3
  </footer>
</div>

<script>
  let currentTyp = 'ostatni';

  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
  }

  function setTyp(t) {
    currentTyp = t;
    document.getElementById('btn-ostatni').classList.toggle('active', t === 'ostatni');
    document.getElementById('btn-zelen').classList.toggle('active', t === 'zelen');
    document.getElementById('h-wrap').style.display = (t === 'zelen' ? 'block' : 'none');
    calc();
  }

  function calc() {
    const d = parseFloat(document.getElementById('inp-delka').value) || 0;
    const s = parseFloat(document.getElementById('inp-sirka').value) || 0;
    const h = parseFloat(document.getElementById('inp-hloubka').value) || 0;

    const nad = d * s;
    let mimo, formula, subMimo;

    if (currentTyp === 'ostatni') {
      mimo = d * 0.5;
      subMimo = `${d.toFixed(2)} × 0,50`;
      formula = `Vzorec: (D × Š) + (D × 0,5)`;
    } else {
      const koef = (s + h + 0.6);
      mimo = d * koef;
      subMimo = `${d.toFixed(2)} × (${s.toFixed(2)} + ${h.toFixed(2)} + 0,60)`;
      formula = `Vzorec: (D × Š) + (D × (Š + H + 0,6))`;
    }

    const f = (n) => n.toFixed(2).replace('.', ',');

    document.getElementById('res-nad').textContent = f(nad) + ' m²';
    document.getElementById('sub-nad').textContent = `${f(d)} × ${f(s)}`;
    document.getElementById('res-mimo').textContent = f(mimo) + ' m²';
    document.getElementById('sub-mimo').textContent = subMimo.replace(/\./g, ',');
    document.getElementById('res-total').textContent = f(nad + mimo) + ' m²';
    document.getElementById('txt-formula').textContent = formula;
  }
  calc();
</script>

</body>
</html>
